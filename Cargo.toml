[package]
name = "init"
version = "0.1.0"
edition = "2021"

[profile.release]
opt-level = "z"
lto = true
strip = true

[dependencies]
colored = "2.1.0"
crossterm = "0.27.0"
linux-ipc = "0.1.0"
nix = { version = "0.29.0", features = ["reboot", "mount"] }
serde = { version = "1.0.200", features = ["derive"] }
toml = "0.8.12"
ipc-types = { path = "crates/ipc-types" }
